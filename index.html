<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget</title>
<style>
  *{box-sizing:border-box;}
  body{
    font-family: Arial, Helvetica, sans-serif;
    background:#fff; color:#111;
    margin:0; padding:24px 20px 60px;
  }
  .wrap{ max-width:960px; margin:0 auto; }
  h1{ font-size:22px; margin:0 0 4px 0; }
  .sub{ color:#666; font-size:13px; margin-bottom:18px; }

  .tabs{ display:flex; border-bottom:2px solid #111; margin-bottom:20px; }
  .tab-btn{
    font-family:inherit; font-size:14px; font-weight:bold; background:none; border:none;
    padding:8px 16px; cursor:pointer; color:#888; border-bottom:2px solid transparent; margin-bottom:-2px;
  }
  .tab-btn.active{ color:#111; border-bottom-color:#111; }
  .view{ display:none; }
  .view.active{ display:block; }

  h2{ font-size:14px; text-transform:uppercase; letter-spacing:0.03em; margin:22px 0 8px 0; color:#333; }
  h2:first-child{ margin-top:0; }

  table{ border-collapse:collapse; width:100%; }
  .goals-table td{ padding:5px 8px 5px 0; font-size:13.5px; }
  .goals-table td.label{ color:#333; width:210px; }
  .goals-table input{ width:120px; padding:5px 7px; border:1px solid #bbb; font-size:13.5px; font-family:inherit; }

  .status-table td{ padding:4px 10px 4px 0; font-size:13.5px; }
  .status-table td.label{ color:#333; width:210px; }
  .status-table td.val{ font-weight:bold; }
  .status-table td.ok{ color:#1a7a3c; }

  .months-header{ display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:6px 16px; margin:22px 0 8px 0; }
  .months-header h2{ margin:0; }
  .standing-inline{ font-size:12.5px; color:#333; display:flex; gap:16px; flex-wrap:wrap; }
  .standing-inline span b{ font-weight:bold; }
  .standing-inline span.ok b{ color:#1a7a3c; }

  ul.milestones{ list-style:none; padding:0; margin:0; font-size:13.5px; }
  ul.milestones li{ padding:4px 0; border-bottom:1px solid #eee; display:flex; }
  ul.milestones li span.label{ width:210px; color:#333; }
  ul.milestones li b{ font-weight:bold; }
  ul.milestones li.done{ color:#1a7a3c; }

  .btn{ font-family:inherit; font-size:13px; font-weight:bold; padding:7px 14px; border:1px solid #111; background:#111; color:#fff; cursor:pointer; }
  .btn.secondary{ background:#fff; color:#111; }

  table.grid{ width:100%; font-size:12.5px; }
  table.grid th{ text-align:left; border-bottom:2px solid #111; padding:6px 6px; font-size:11px; text-transform:uppercase; letter-spacing:0.02em; white-space:nowrap;}
  table.grid td{ border-bottom:1px solid #ddd; padding:3px 6px; white-space:nowrap; }
  table.grid input{ width:72px; padding:4px 5px; border:1px solid #ccc; font-family:inherit; font-size:12.5px; }
  table.grid td.month-cell{ font-weight:bold; white-space:nowrap; }
  table.grid td.nett-cell{ font-weight:bold; text-align:right; }
  table.grid td.nett-cell.neg{ color:#b3261e; }
  table.grid td.nett-cell.pos{ color:#1a7a3c; }
  table.grid td.del-cell{ text-align:center; }
  table.grid td.del-cell button{ border:none; background:none; color:#999; cursor:pointer; font-size:13px; }
  .grid-scroll{ overflow-x:auto; }
  .foot-note{ font-size:11.5px; color:#888; margin-top:16px; }
  .warn-inline{ color:#b3261e; font-size:10.5px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Budget</h1>
  <div class="sub">Debt → ISA → LISA → move-out.</div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="plan">Plan</button>
    <button class="tab-btn" data-tab="months">Months</button>
  </div>

  <!-- PLAN -->
  <div class="view active" id="view-plan">
    <h2>Goals and Current Standing</h2>
    <table class="goals-table">
      <tr><td class="label">ISA target (£)</td><td><input type="number" id="set-isa-target" step="1"></td></tr>
      <tr><td class="label">Debt owed now (£)</td><td><input type="number" id="set-start-debt" step="0.01"></td></tr>
      <tr><td class="label">ISA balance now (£)</td><td><input type="number" id="set-start-isa" step="0.01"></td></tr>
      <tr><td class="label">LISA balance now (£)</td><td><input type="number" id="set-start-lisa-total" step="0.01"></td></tr>
      <tr><td class="label">LISA paid in this tax year (£)</td><td><input type="number" id="set-start-lisa-ty" step="0.01"></td></tr>
      <tr><td class="label">As of month</td><td><input type="month" id="set-asof"></td></tr>
    </table>
    <div style="margin-top:10px;"><button class="btn" id="btn-save-settings">Save</button></div>

    <h2>Milestones</h2>
    <ul class="milestones" id="milestones"></ul>
  </div>

  <!-- MONTHS -->
  <div class="view" id="view-months">
    <div class="months-header">
      <h2>Months</h2>
      <div class="standing-inline" id="standing-inline"></div>
    </div>
    <div class="grid-scroll">
      <table class="grid">
        <thead>
          <tr>
            <th>Month</th><th>Income</th><th>Nett</th><th>Bills</th><th>Rent</th><th>Transport</th><th>Cat</th><th>Other</th>
            <th>To Debt</th><th>To ISA</th><th>To LISA</th><th></th>
          </tr>
        </thead>
        <tbody id="months-body"></tbody>
      </table>
    </div>
    <div style="margin-top:12px;"><button class="btn secondary" id="btn-add-month">+ Add next month</button></div>
  </div>

</div>

<script>
(function(){

const STORE = { settings:'settings', balances:'balances', months:'months' };
const PAY_DAY = 28;
const LISA_PROCESS_DAY = 7;

function taxYearBounds(){
  const now = new Date();
  const year = now.getFullYear();
  const apr6ThisYear = new Date(year,3,6);
  if(now >= apr6ThisYear){
    return { start: new Date(year,3,6), end: new Date(year+1,3,5) };
  }
  return { start: new Date(year-1,3,6), end: new Date(year,3,5) };
}

const defaultSettings = { isaTarget: 5000, debtTarget: 0, lisaTarget: 4000 };
const defaultBalances = { asOf: '2026-06', debt: 4879.68, isa: 4397, lisaTotal: 5917, lisaThisTaxYear: 0 };

const defaultMonths = [
  { key:'2026-07', income:2300, bills:442.01, rent:0, transport:0, cat:125, other:0, debtPayment:1600, isaContribution:0, lisaContribution:0 },
  { key:'2026-08', income:2300, bills:442.01, rent:0, transport:0, cat:125, other:0, debtPayment:1600, isaContribution:0, lisaContribution:0 },
  { key:'2026-09', income:2300, bills:442.01, rent:0, transport:0, cat:125, other:0, debtPayment:1679.68, isaContribution:0, lisaContribution:0 },
  { key:'2026-10', income:2300, bills:442.01, rent:0, transport:0, cat:125, other:0, debtPayment:0, isaContribution:1600, lisaContribution:0 },
  { key:'2026-11', income:2300, bills:421.02, rent:0, transport:0, cat:0, other:0, debtPayment:0, isaContribution:0, lisaContribution:1000 },
  { key:'2026-12', income:2300, bills:421.02, rent:0, transport:0, cat:0, other:0, debtPayment:0, isaContribution:0, lisaContribution:1000 },
  { key:'2027-01', income:2300, bills:421.02, rent:0, transport:0, cat:0, other:0, debtPayment:0, isaContribution:0, lisaContribution:1000 },
  { key:'2027-02', income:2300, bills:421.02, rent:0, transport:0, cat:0, other:0, debtPayment:0, isaContribution:0, lisaContribution:1000 }
];

let settings = JSON.parse(JSON.stringify(defaultSettings));
let balances = JSON.parse(JSON.stringify(defaultBalances));
let months = JSON.parse(JSON.stringify(defaultMonths));

async function loadAll(){
  try{ const s = await window.storage.get(STORE.settings); if(s && s.value) settings = Object.assign({}, defaultSettings, JSON.parse(s.value)); }catch(e){}
  try{ const b = await window.storage.get(STORE.balances); if(b && b.value) balances = Object.assign({}, defaultBalances, JSON.parse(b.value)); }catch(e){}
  try{ const m = await window.storage.get(STORE.months); if(m && m.value){ const arr = JSON.parse(m.value); if(Array.isArray(arr) && arr.length) months = arr; } }catch(e){}
  renderAll();
}
async function saveSettings(){ try{ await window.storage.set(STORE.settings, JSON.stringify(settings)); }catch(e){} }
async function saveBalances(){ try{ await window.storage.set(STORE.balances, JSON.stringify(balances)); }catch(e){} }
async function saveMonths(){ try{ await window.storage.set(STORE.months, JSON.stringify(months)); }catch(e){} }

function fmt(n){
  n = Number(n)||0;
  const neg = n<0;
  const s = Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:2, maximumFractionDigits:2});
  return (neg?'-£':'£')+s;
}
function monthLabel(key){
  const [y,m] = key.split('-').map(Number);
  return new Date(y,m-1,1).toLocaleString('en-GB',{month:'short', year:'2-digit'});
}
function addMonths(key,n){
  let [y,m]=key.split('-').map(Number); m+=n;
  while(m>12){m-=12;y++;} while(m<1){m+=12;y--;}
  return y+'-'+String(m).padStart(2,'0');
}
function nettOf(mo){
  const out = (mo.bills||0)+(mo.rent||0)+(mo.transport||0)+(mo.cat||0)+(mo.other||0)+(mo.debtPayment||0)+(mo.isaContribution||0)+(mo.lisaContribution||0);
  return (mo.income||0) - out;
}
function lisaCountsThisTaxYear(monthKey){
  const [py,pm] = addMonths(monthKey,1).split('-').map(Number);
  const processDate = new Date(py,pm-1,LISA_PROCESS_DAY);
  const {start,end} = taxYearBounds();
  return processDate >= start && processDate <= end;
}

function round2(n){ return Math.round((n + Number.EPSILON) * 100) / 100; }

function computeTimeline(){
  const sorted = months.slice().sort((a,b)=>a.key.localeCompare(b.key));
  let debt=balances.debt, isa=balances.isa, lisaTotal=balances.lisaTotal, lisaTY=balances.lisaThisTaxYear;
  let debtClearedAt=null, isaTargetAt=null, lisaMaxedAt=null;
  const rows=[];
  for(const mo of sorted){
    debt = round2(Math.max(0, debt-(mo.debtPayment||0)));
    isa = round2(isa+(mo.isaContribution||0));
    lisaTotal = round2(lisaTotal+(mo.lisaContribution||0));
    const countsTY = lisaCountsThisTaxYear(mo.key);
    if(countsTY) lisaTY = round2(lisaTY + (mo.lisaContribution||0));
    if(debtClearedAt===null && debt<=settings.debtTarget) debtClearedAt=mo.key;
    if(isaTargetAt===null && isa>=settings.isaTarget) isaTargetAt=mo.key;
    if(lisaMaxedAt===null && lisaTY>=settings.lisaTarget) lisaMaxedAt=mo.key;
    rows.push({key:mo.key, debt, isa, lisaTotal, lisaTY, countsTY, lisaAmount:mo.lisaContribution||0});
  }
  let moveReadyAt=null;
  if(debtClearedAt && isaTargetAt) moveReadyAt = (debtClearedAt.localeCompare(isaTargetAt)>=0)?debtClearedAt:isaTargetAt;
  return {rows, debtClearedAt, isaTargetAt, lisaMaxedAt, moveReadyAt,
    finalDebt: rows.length?rows[rows.length-1].debt:debt,
    finalIsa: rows.length?rows[rows.length-1].isa:isa,
    finalLisaTY: rows.length?rows[rows.length-1].lisaTY:lisaTY};
}

function renderSettingsForm(){
  document.getElementById('set-isa-target').value = settings.isaTarget;
  document.getElementById('set-start-debt').value = balances.debt;
  document.getElementById('set-start-isa').value = balances.isa;
  document.getElementById('set-start-lisa-total').value = balances.lisaTotal;
  document.getElementById('set-start-lisa-ty').value = balances.lisaThisTaxYear;
  document.getElementById('set-asof').value = balances.asOf;
}

function renderPlan(){
  const tl = computeTimeline();
  document.getElementById('standing-inline').innerHTML = `
    <span>Debt owed <b class="${tl.finalDebt<=settings.debtTarget?'':''}">${fmt(tl.finalDebt)}</b></span>
    <span class="${tl.finalIsa>=settings.isaTarget?'ok':''}">ISA buffer <b>${fmt(tl.finalIsa)}</b></span>
    <span class="${tl.finalLisaTY>=settings.lisaTarget?'ok':''}">LISA this tax year <b>${fmt(tl.finalLisaTY)}</b></span>
  `;
  const items = [
    {label:'Debt clear', at: tl.debtClearedAt},
    {label:'ISA target hit', at: tl.isaTargetAt},
    {label:'LISA maxed', at: tl.lisaMaxedAt},
    {label:'Move-out ready', at: tl.moveReadyAt}
  ];
  document.getElementById('milestones').innerHTML = items.map(it=>
    `<li class="${it.at?'done':''}"><span class="label">${it.label}</span><b>${it.at?monthLabel(it.at):'not yet on current plan'}</b></li>`
  ).join('');
}

function renderMonths(){
  const sorted = months.slice().sort((a,b)=>a.key.localeCompare(b.key));
  const body = document.getElementById('months-body');
  body.innerHTML = sorted.map(mo=>{
    const nett = nettOf(mo);
    return `<tr data-key="${mo.key}">
      <td class="month-cell">${monthLabel(mo.key)}</td>
      <td><input type="number" step="0.01" data-field="income" value="${mo.income}"></td>
      <td class="nett-cell ${nett>=0?'pos':'neg'}">${fmt(nett)}</td>
      <td><input type="number" step="0.01" data-field="bills" value="${mo.bills}"></td>
      <td><input type="number" step="0.01" data-field="rent" value="${mo.rent||0}"></td>
      <td><input type="number" step="0.01" data-field="transport" value="${mo.transport}"></td>
      <td><input type="number" step="0.01" data-field="cat" value="${mo.cat}"></td>
      <td><input type="number" step="0.01" data-field="other" value="${mo.other}"></td>
      <td><input type="number" step="0.01" data-field="debtPayment" value="${mo.debtPayment}"></td>
      <td><input type="number" step="0.01" data-field="isaContribution" value="${mo.isaContribution}"></td>
      <td><input type="number" step="0.01" data-field="lisaContribution" value="${mo.lisaContribution}"></td>
      <td class="del-cell"><button data-del="${mo.key}" title="delete">✕</button></td>
    </tr>`;
  }).join('');
}

function renderAll(){ renderSettingsForm(); renderPlan(); renderMonths(); }

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-'+btn.dataset.tab).classList.add('active');
  });
});

document.getElementById('btn-save-settings').addEventListener('click', async ()=>{
  settings.isaTarget = Number(document.getElementById('set-isa-target').value)||0;
  balances.debt = Number(document.getElementById('set-start-debt').value)||0;
  balances.isa = Number(document.getElementById('set-start-isa').value)||0;
  balances.lisaTotal = Number(document.getElementById('set-start-lisa-total').value)||0;
  balances.lisaThisTaxYear = Number(document.getElementById('set-start-lisa-ty').value)||0;
  balances.asOf = document.getElementById('set-asof').value || defaultBalances.asOf;
  await saveSettings(); await saveBalances();
  renderPlan();
});

document.getElementById('btn-add-month').addEventListener('click', async ()=>{
  const sorted = months.slice().sort((a,b)=>a.key.localeCompare(b.key));
  const lastKey = sorted.length ? sorted[sorted.length-1].key : addMonths(balances.asOf,0);
  const nextKey = addMonths(lastKey,1);
  if(months.find(m=>m.key===nextKey)) return;
  const template = sorted.length ? sorted[sorted.length-1] : {income:0,bills:0,rent:0,transport:0,cat:0,other:0,debtPayment:0,isaContribution:0,lisaContribution:0};
  const fresh = Object.assign({}, template, {key:nextKey});
  months.push(fresh);
  await saveMonths();
  renderMonths(); renderPlan();
});

document.getElementById('months-body').addEventListener('change', async (e)=>{
  const input = e.target.closest('input[data-field]');
  if(!input) return;
  const row = e.target.closest('tr');
  const key = row.dataset.key;
  const mo = months.find(m=>m.key===key);
  mo[input.dataset.field] = Number(input.value)||0;
  await saveMonths();
  renderMonths(); renderPlan();
});

document.getElementById('months-body').addEventListener('click', async (e)=>{
  const del = e.target.closest('[data-del]');
  if(!del) return;
  if(!confirm('Delete this month?')) return;
  months = months.filter(m=>m.key!==del.dataset.del);
  await saveMonths();
  renderMonths(); renderPlan();
});

loadAll();
})();
</script>
</body>
</html>
